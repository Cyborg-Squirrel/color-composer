micronaut:
  application:
    name: color-composer

datasources:
  default:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:tc:postgresql:15-alpine:///colorcomposer?TC_INITSCRIPT=sql/init-db.sql
    dialect: POSTGRES
    db-type: postgres

flyway:
  datasources:
    default:
      enabled: true
      locations: classpath:db/migration/postgres