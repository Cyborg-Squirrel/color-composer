micronaut:
  application:
    name: color-composer
  http:
    client:
      ws:
        compression:
          enabled: false # Default is true, results in NoClassDefFoundError: com/jcraft/jzlib/Deflater
  server:
    cors:
      enabled: true

datasources:
  default:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    dialect: POSTGRES
    url: jdbc:tc:postgresql:15.2-alpine:///db?TC_INITSCRIPT=sql/init-db.sql
    username: sa
    password: ""

flyway:
  datasources:
    default:
      enabled: true
      locations: classpath:db/migration/postgres